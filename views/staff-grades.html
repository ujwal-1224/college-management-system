<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Grades - Staff</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/enterprise-theme.css">
</head>
<body>
  <nav class="navbar-enterprise navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/staff/dashboard">College Portal</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/staff/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/staff/timetable">Timetable</a></li>
          <li class="nav-item"><a class="nav-link" href="/staff/attendance">Attendance</a></li>
          <li class="nav-item"><a class="nav-link active" href="/staff/grades">Grades</a></li>
          <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-enterprise">
    <div class="page-header-enterprise">
      <h1>Manage Grades</h1>
      <p>Upload and manage student grades</p>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="card-enterprise">
          <div class="card-enterprise-header">
            <i class="bi bi-pencil-square"></i> Select Exam
          </div>
          <div class="card-body">
            <form id="examSelectForm" class="form-enterprise">
              <div class="row">
                <div class="col-md-4">
                  <label for="courseSelect" class="form-label">Course</label>
                  <select class="form-control" id="courseSelect" required>
                    <option value="">Loading courses...</option>
                  </select>
                </div>
                
                <div class="col-md-4">
                  <label for="examSelect" class="form-label">Exam</label>
                  <select class="form-select" id="examSelect" required>
                    <option value="">Select course first</option>
                  </select>
                </div>
                
                <div class="col-md-4">
                  <label class="form-label">&nbsp;</label>
                  <button type="submit" class="btn btn-success w-100">Load Students</button>
                </div>
              </div>
            </form>
            
            <div class="mt-3">
              <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createExamModal">
                Create New Exam
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card mt-4" id="gradesCard" style="display: none;">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Enter Grades - <span id="selectedExam"></span></h5>
        <div>
          <span class="badge bg-info">Max Marks: <span id="maxMarks">0</span></span>
        </div>
      </div>
      <div class="card-body">
        <div id="alertMessage" class="alert d-none"></div>
        
        <form id="gradesForm">
          <div class="table-responsive">
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>Roll No</th>
                  <th>Student Name</th>
                  <th>Email</th>
                  <th>Marks Obtained</th>
                  <th>Grade</th>
                </tr>
              </thead>
              <tbody id="studentsTable">
                <tr><td colspan="5" class="text-center">Select exam to load students</td></tr>
              </tbody>
            </table>
          </div>
          
          <div class="mt-3">
            <button type="submit" class="btn btn-primary btn-lg">Save Grades</button>
            <button type="button" class="btn btn-secondary btn-lg" onclick="location.reload()">Reset</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Create Exam Modal -->
  <div class="modal fade" id="createExamModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Create New Exam</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="createExamForm">
            <div class="mb-3">
              <label for="examCourse" class="form-label">Course</label>
              <select class="form-select" id="examCourse" required>
                <option value="">Select course</option>
              </select>
            </div>
            
            <div class="mb-3">
              <label for="examName" class="form-label">Exam Name</label>
              <input type="text" class="form-control" id="examName" placeholder="e.g., Mid-Term, Final Exam" required>
            </div>
            
            <div class="mb-3">
              <label for="examDate" class="form-label">Exam Date</label>
              <input type="date" class="form-control" id="examDate" required>
            </div>
            
            <div class="mb-3">
              <label for="examMaxMarks" class="form-label">Maximum Marks</label>
              <input type="number" class="form-control" id="examMaxMarks" min="1" max="1000" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Create Exam</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/staff-grades.js"></script>
</body>
</html>
