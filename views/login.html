<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - College Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/enterprise-theme.css">
  <style>
    body {
      background: var(--primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      max-width: 450px;
      width: 100%;
    }
    .role-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-weight: 600;
      margin-bottom: 1rem;
      background: var(--accent);
      color: white;
    }
    .back-link {
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      margin-bottom: 1rem;
      transition: var(--transition);
    }
    .back-link:hover {
      color: rgba(255, 255, 255, 0.8);
    }
    .card {
      border: none;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
    }
    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .demo-cred {
      margin-top: 15px;
      text-align: center;
      font-size: 0.82rem;
      color: #6b7280;
    }
    .demo-cred span {
      cursor: pointer;
      color: #2563EB;
    }
    .demo-cred span:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <a href="/" class="back-link">
      <i class="bi bi-arrow-left me-2"></i>Back to Home
    </a>
    
    <div class="card shadow-lg">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h2 style="color: var(--primary); font-weight: 600;">College Management System</h2>
          <div id="roleDisplay"></div>
        </div>
        
        <div id="errorMessage" class="alert-enterprise alert-enterprise-danger d-none"></div>
        
        <form id="loginForm" class="form-enterprise">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username" required>
            </div>
          </div>
          
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>
          </div>
          
          <button type="submit" class="btn-enterprise btn-enterprise-primary w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
          </button>
        </form>
        
        <div class="demo-cred">
          Demo Credentials:<br>
          <span onclick="fillLogin('admin','admin123')">Admin (admin/admin123)</span> |
          <span onclick="fillLogin('ujwal','student123')">Student (ujwal/student123)</span> |
          <span onclick="fillLogin('soubhagya','staff123')">Staff (soubhagya/staff123)</span> |
          <span onclick="fillLogin('shashi','parent123')">Parent (shashi/parent123)</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function fillLogin(username, password) {
      document.querySelector('input[name="username"]').value = username;
      document.querySelector('input[name="password"]').value = password;
    }

    // Get role from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role');
    
    if (role) {
      const roleDisplay = document.getElementById('roleDisplay');
      const roleNames = {
        'student': 'Student',
        'staff': 'Staff',
        'parent': 'Parent',
        'admin': 'Admin'
      };
      
      if (roleNames[role]) {
        roleDisplay.innerHTML = `<span class="role-badge">${roleNames[role]} Login</span>`;
      }
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      
      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role })
        });
        
        const data = await response.json();
        
        if (data.success) {
          window.location.href = data.redirectUrl;
        } else {
          errorDiv.textContent = data.message;
          errorDiv.classList.remove('d-none');
        }
      } catch (error) {
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
