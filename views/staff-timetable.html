<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Timetable - Staff Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/enterprise-theme.css">
  <style>
    .tt-day-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 1.25rem;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .tt-today {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,.15);
    }
    .tt-day-header {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1.25rem;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 600;
      font-size: .95rem;
      color: #1e3a8a;
    }
    .tt-today .tt-day-header {
      background: #eff6ff;
      color: #1d4ed8;
    }
    .tt-today-badge {
      background: #2563eb;
      color: #fff;
      font-size: .7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .tt-count {
      margin-left: auto;
      font-size: .78rem;
      color: #64748b;
      font-weight: 400;
    }
    .tt-slot {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .85rem 1.25rem;
      border-bottom: 1px solid #f1f5f9;
      flex-wrap: wrap;
    }
    .tt-slot:last-child { border-bottom: none; }
    .tt-slot-alt { background: #fafbfc; }
    .tt-time {
      min-width: 160px;
      font-size: .85rem;
      color: #475569;
      white-space: nowrap;
    }
    .tt-info {
      flex: 1;
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-wrap: wrap;
    }
    .tt-code {
      background: #1e3a8a;
      color: #fff;
      font-size: .75rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 6px;
      letter-spacing: .03em;
    }
    .tt-name {
      font-weight: 500;
      color: #1e293b;
      font-size: .9rem;
    }
    .tt-meta {
      display: flex;
      gap: 1rem;
      font-size: .8rem;
      color: #64748b;
      flex-wrap: wrap;
    }
    .tt-meta span { white-space: nowrap; }
    .tt-meta i { margin-right: 3px; }
  </style>
</head>
<body>
  <nav class="navbar-enterprise navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/staff/dashboard"><i class="bi bi-mortarboard-fill me-2"></i>Staff Portal</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/staff/dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="/staff/timetable"><i class="bi bi-calendar-week me-1"></i>Timetable</a></li>
          <li class="nav-item"><a class="nav-link" href="/staff/attendance"><i class="bi bi-clipboard-check me-1"></i>Attendance</a></li>
          <li class="nav-item"><a class="nav-link" href="/staff/grades"><i class="bi bi-bar-chart-fill me-1"></i>Grades</a></li>
          <li class="nav-item"><a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-enterprise">
    <div class="page-header-enterprise">
      <h1>My Timetable</h1>
      <p>Weekly class schedule — grouped by day</p>
    </div>
    <div id="timetableContainer">
      <p class="text-center text-muted py-4">Loading...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/staff-timetable.js"></script>
</body>
</html>
