<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/ui.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar-modern navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">🎓 College Management</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="/student/dashboard">Dashboard</a></li>
          <li class="nav-item"><span class="nav-link">👤 Student</span></li>
          <li class="nav-item"><a class="nav-link btn-modern-danger" href="/logout" style="color: white; padding: 0.5rem 1rem; border-radius: 8px;">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 style="font-family: var(--font-primary); color: #1f2937;">Student Dashboard 📚</h2>
    
    <div class="row mt-4">
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-card-icon" style="background: var(--gradient-info);">
            <i class="bi bi-person-circle"></i>
          </div>
          <h5 class="stat-card-label">My Profile</h5>
          <p class="stat-card-value" style="font-size: 1.2rem;" id="studentName">Loading...</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-card-icon" style="background: var(--gradient-success);">
            <i class="bi bi-building"></i>
          </div>
          <h5 class="stat-card-label">Department</h5>
          <p class="stat-card-value" style="font-size: 1.2rem;" id="department">Loading...</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-card-icon" style="background: var(--gradient-warning);">
            <i class="bi bi-calendar3"></i>
          </div>
          <h5 class="stat-card-label">Semester</h5>
          <p class="stat-card-value" style="font-size: 1.2rem;" id="semester">Loading...</p>
        </div>
      </div>
    </div>

    <div class="modern-card mt-4">
      <div class="modern-card-header">
        <i class="bi bi-calendar-check"></i> 📅 Recent Attendance
      </div>
      <div class="table-responsive">
        <table class="modern-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Course</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="attendanceTable">
            <tr><td colspan="3" class="text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="modern-card mt-4">
      <div class="modern-card-header">
        <i class="bi bi-trophy"></i> 🏆 My Results
      </div>
      <div class="table-responsive">
        <table class="modern-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Course</th>
              <th>Exam</th>
              <th>Marks</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody id="resultsTable">
            <tr><td colspan="5" class="text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/student.js"></script>
</body>
</html>
